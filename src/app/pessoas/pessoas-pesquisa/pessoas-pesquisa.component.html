<div class="container">
  <form autocomplete="off" (ngSubmit)="pesquisar()">
    <div class="grid">

      <div class="col-12">
        <h1>Pessoas</h1>
      </div>

      <div class="col-12 p-fluid">
        <label for="descricao" style="font-weight: bold;">Nome</label>
        <input pInputText type="text" name="nome" [(ngModel)]="filtro.nome">
      </div>

      <div class="col-12">
        <button pButton type="submit" label="Pesquisar"></button>
      </div>
    </div>
  </form>

  <div class="grid">
    <div class="col-12">
      <p-table [value]="pessoas" [paginator]="true" [rows]="filtro.itensPorPagina" [responsive]="true"
      [lazy]="true" [totalRecords]="totalRegistros" (onLazyLoad)="aoMudarPagina($event)"  #tabela>
        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="6">
              Nenhuma pessoa encontrada
            </td>
          </tr>
        </ng-template>
        <ng-template pTemplate="header">
          <tr>
            <th>Nome</th>
            <th>Cidade</th>
            <th>Estado</th>
            <th>Status</th>
            <th></th>
        </tr>
        </ng-template>
        <ng-template pTemplate="body" let-pessoa>
          <tr>
              <td>
                <span class="p-column-title">Nome</span>
                {{pessoa.nome}}
              </td>
              <td>
                <span class="p-column-title">Cidade</span>
                {{pessoa.endereco.cidade}}
              </td>
              <td>
                <span class="p-column-title">Estado</span>
                {{pessoa.endereco.estado}}
              </td>
              <td class="col-status">
                <span class="p-column-title">Status</span>
                <a  style="cursor: pointer;" (click)="alternaStatus(pessoa)">{{pessoa.ativo === true ? 'Ativo' : "Inativo"}}</a>
              </td>
              <td class="col-acoes">
                <a pButton icon="pi pi-pencil" pTooltip="Editar" tooltipPosition="top"></a>
                <button pButton icon="pi pi-trash" pTooltip="Excluir" tooltipPosition="top" (click)="confirmarExclusao(pessoa)"></button>
              </td>
          </tr>
        </ng-template>
      </p-table>

    </div>
  </div>

  <div class="col-12">
    <button pButton type="submit" label="Nova Pessoa"></button>
  </div>
</div>
