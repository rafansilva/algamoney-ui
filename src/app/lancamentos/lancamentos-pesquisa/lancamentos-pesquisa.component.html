<div class="container">
  <div class="grid">

    <div class="col-12">
      <h1>Lançamentos</h1>
    </div>

    <div class="col-12 p-fluid">
      <label for="descricao">Descrição</label>
      <input pInputText type="text">
    </div>

    <div class="col-12">
      <label for="vencimento" class="block">Vencimento</label>
      <input pInputText class="w-1" type="text">

      <label for="ate" class="mx-2">Até</label>
      <input pInputText class="w-1" type="text">
    </div>

    <div class="col-12">
      <button pButton type="submit" label="Pesquisar"></button>
    </div>
  </div>

  <div class="grid">
    <div class="col-12">
      <app-lancamentos-grid [lancamentos]="lancamentos"></app-lancamentos-grid>
    </div>
  </div>

  <div class="col-12">
    <button pButton type="submit" label="Novo lançamento"></button>
  </div>
</div>
