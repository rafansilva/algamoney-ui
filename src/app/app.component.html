<app-navbar *ngIf="exibindoNavbar()"></app-navbar>
<router-outlet></router-outlet>

<p-toast position="bottom-right"></p-toast>

<p-confirmDialog header="Confirmação" icon="pi question-circle" #confimacao>
  <p-footer>
    <button type="button" pButton icon="pi pi-check" label="Sim" (click)="confimacao.accept()"></button>
    <button type="button" pButton icon="pi pi-times" label="Não" (click)="confimacao.reject()"></button>
  </p-footer>
</p-confirmDialog>
